{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Add Transaction</h1>
</div>

<div class="card shadow-sm border-0 rounded-4 mb-4">
    <div class="card-body p-4">
        <form method="POST" action="">
            <div class="row mb-3">
                <div class="col-md-6 mb-3">
                    <label for="invoice_number" class="form-label">Invoice Number <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="invoice_number" name="invoice_number" required>
                    <div id="invoice_feedback" class="form-text text-primary" style="display: none;"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="date" class="form-label">Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="date" name="date" required value="{{ current_date }}">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6 mb-3">
                    <label for="customer_id" class="form-label">Customer <span class="text-danger">*</span></label>
                    <select class="form-select" id="customer_id" name="customer_id" required>
                        <option value="">Select Customer...</option>
                        {% for c in customers %}
                        <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="salesperson_id" class="form-label">Salesperson <span class="text-danger">*</span></label>
                    <select class="form-select" id="salesperson_id" name="salesperson_id" required>
                        <option value="">Select Salesperson...</option>
                        {% for s in salespersons %}
                        <option value="{{ s.id }}">{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6 mb-3">
                    <label for="invoice_amount" class="form-label">Invoice Amount ($)</label>
                    <input type="number" step="0.01" min="0" class="form-control" id="invoice_amount" name="invoice_amount" value="0.00">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="payment_amount" class="form-label">Payment Amount ($)</label>
                    <input type="number" step="0.01" min="0" class="form-control" id="payment_amount" name="payment_amount" value="0.00">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6 mb-3">
                    <label for="payment_type_id" class="form-label">Payment Type</label>
                    <select class="form-select" id="payment_type_id" name="payment_type_id">
                        <option value="">None / Not Paid</option>
                        {% for pt in payment_types %}
                        <option value="{{ pt.id }}">{{ pt.type_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="bank_account_id" class="form-label">Bank Account</label>
                    <select class="form-select" id="bank_account_id" name="bank_account_id">
                        <option value="">None / N/A</option>
                        {% for b in bank_accounts %}
                        <option value="{{ b.id }}">{{ b.account_name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mb-4">
                <label for="remark" class="form-label">Remark / Notes</label>
                <textarea class="form-control" id="remark" name="remark" rows="2"></textarea>
            </div>

            <hr class="my-4 text-muted">
            <button type="submit" class="btn btn-primary rounded-pill px-4 shadow-sm fw-semibold"><i class="fas fa-save me-2"></i>Save Transaction</button>
            <a href="{{ url_for('routes.dashboard') }}" class="btn btn-outline-secondary rounded-pill px-4 ms-2 fw-semibold">Cancel</a>
        </form>
    </div>
</div>

<script>
    // Set today's date as default
    document.addEventListener('DOMContentLoaded', function() {
        if(!document.getElementById('date').value) {
            document.getElementById('date').valueAsDate = new Date();
        }
    });

    // Auto-fill and validation logic for existing invoices
    document.getElementById('invoice_number').addEventListener('blur', function() {
        const invNum = this.value.trim();
        if(!invNum) return;

        fetch(`/api/invoice_details/${encodeURIComponent(invNum)}`)
            .then(res => res.json())
            .then(data => {
                const feedback = document.getElementById('invoice_feedback');
                const invInput = document.getElementById('invoice_amount');
                const payInput = document.getElementById('payment_amount');
                const custSelect = document.getElementById('customer_id');

                if(data.exists) {
                    // This is a follow-up payment
                    feedback.innerHTML = `<strong>Existing Invoice Found:</strong> ${data.customer_name}.<br>Remaining Balance: $${data.remaining_balance.toFixed(2)}`;
                    feedback.style.display = 'block';

                    // Lock invoice amount to 0
                    invInput.value = 0;
                    invInput.setAttribute('readonly', true);
                    
                    // Lock customer dropdown
                    custSelect.value = data.customer_id;
                    // Note: Instead of disabled (which drops it from POST), we enforce via backend, but we can visually disable pointer events
                    custSelect.style.pointerEvents = 'none';
                    custSelect.style.backgroundColor = '#e9ecef';

                    // Auto-fill suggested payment if there's a balance
                    if(data.remaining_balance > 0) {
                        payInput.value = data.remaining_balance.toFixed(2);
                    } else {
                        payInput.value = 0;
                        feedback.innerHTML += ' <span class="text-success">(Fully Paid)</span>';
                    }
                } else {
                    // This is a new invoice
                    feedback.style.display = 'none';
                    invInput.removeAttribute('readonly');
                    if(invInput.value == "0") invInput.value = ""; // Clear the 0 to prompt user

                    custSelect.style.pointerEvents = 'auto';
                    custSelect.style.backgroundColor = '';
                }
            })
            .catch(err => console.error('Error fetching invoice API:', err));
    });
</script>
{% endblock %}
