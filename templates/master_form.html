{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">{{ title }}</h1>
</div>

<div class="card shadow-sm border-0 rounded-4 mb-4">
    <div class="card-body p-4">
        <form method="POST" action="{{ submit_url }}">
            <div class="mb-3">
                <label for="name_field" class="form-label">{{ field_label }} *</label>
                <input type="text" class="form-control" id="name_field" name="name_field" value="{{ current_value }}" required>
            </div>
            <hr class="my-4 text-muted">
            <button type="submit" class="btn btn-primary rounded-pill px-4 shadow-sm fw-semibold"><i class="fas fa-save me-2"></i>Save</button>
            <a href="{{ back_url }}" class="btn btn-outline-secondary rounded-pill px-4 ms-2 fw-semibold">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
