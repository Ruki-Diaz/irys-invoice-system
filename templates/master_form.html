{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">{{ title }}</h1>
</div>

<div class="card shadow-sm mb-4">
    <div class="card-body">
        <form method="POST" action="{{ submit_url }}">
            <div class="mb-3">
                <label for="name_field" class="form-label">{{ field_label }} *</label>
                <input type="text" class="form-control" id="name_field" name="name_field" value="{{ current_value }}" required>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{{ back_url }}" class="btn btn-secondary text-white">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
