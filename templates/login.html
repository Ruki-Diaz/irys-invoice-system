{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4 mt-5">
        <div class="card shadow border-0 mt-5 rounded-4">
            <div class="card-body p-5 text-center">
                <div class="mb-4 text-primary">
                    <i class="fas fa-file-invoice-dollar fa-3x"></i>
                </div>
                <h3 class="mb-4 fw-bold">Irys Invoice System</h3>
                <form method="POST" action="{{ url_for('routes.login') }}">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Username"
                            required>
                        <label for="username">Username</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password"
                            required>
                        <label for="password">Password</label>
                    </div>
                    <button class="w-100 btn btn-lg btn-primary shadow-sm rounded-pill fw-semibold" type="submit">Sign in</button>
                    <p class="mt-4 mb-3 text-body-secondary small">Irys Middle East &copy; {{ moment }}</p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
