{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">{{ title }}</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <a href="{{ add_url }}" class="btn btn-sm btn-outline-primary">
            + Add New
        </a>
    </div>
</div>

<div class="table-responsive shadow-sm bg-body rounded-4 overflow-hidden border">
    <table class="table table-striped table-hover align-middle mb-0">
        <thead class="table-light text-muted">
            <tr>
                <th style="width: 10%;">ID</th>
                <th style="width: 65%;">Name / Type</th>
                <th style="width: 25%;" class="text-end">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.id }}</td>
                <td>{{ item.display_name }}</td>
                <td class="text-end">
                    <a href="{{ url_for(edit_endpoint, id=item.id) }}" class="btn btn-sm btn-outline-primary">Edit</a>
                    <form method="POST" action="{{ url_for(delete_endpoint, id=item.id) }}" style="display: inline;" onsubmit="return confirm('Are you sure you want to delete this record?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3" class="text-center py-4">No records found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
