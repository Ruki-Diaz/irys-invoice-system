{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Edit Transaction: {{ tx.invoice_number }}</h1>
</div>

<div class="card shadow-sm mb-4">
    <div class="card-body">
        <form method="POST" action="{{ url_for('routes.edit_transaction', id=tx.id) }}">
            <div class="row mb-3">
                <div class="col-md-6 mb-3">
                    <label for="invoice_number" class="form-label">Invoice Number <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="invoice_number" name="invoice_number" value="{{ tx.invoice_number }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="date" class="form-label">Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="date" name="date" required value="{{ tx.date.strftime('%Y-%m-%d') }}">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6 mb-3">
                    <label for="customer_id" class="form-label">Customer <span class="text-danger">*</span></label>
                    <select class="form-select" id="customer_id" name="customer_id" required>
                        {% for c in customers %}
                        <option value="{{ c.id }}" {% if tx.customer_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="salesperson_id" class="form-label">Salesperson <span class="text-danger">*</span></label>
                    <select class="form-select" id="salesperson_id" name="salesperson_id" required>
                        {% for s in salespersons %}
                        <option value="{{ s.id }}" {% if tx.salesperson_id == s.id %}selected{% endif %}>{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6 mb-3">
                    <label for="invoice_amount" class="form-label">Invoice Amount ($)</label>
                    <input type="number" step="0.01" min="0" class="form-control" id="invoice_amount" name="invoice_amount" value="{{ '%.2f'|format(tx.invoice_amount) }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="payment_amount" class="form-label">Payment Amount ($)</label>
                    <input type="number" step="0.01" min="0" class="form-control" id="payment_amount" name="payment_amount" value="{{ '%.2f'|format(tx.payment_amount) }}">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6 mb-3">
                    <label for="payment_type_id" class="form-label">Payment Type</label>
                    <select class="form-select" id="payment_type_id" name="payment_type_id">
                        <option value="">None / Not Paid</option>
                        {% for pt in payment_types %}
                        <option value="{{ pt.id }}" {% if tx.payment_type_id == pt.id %}selected{% endif %}>{{ pt.type_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="bank_account_id" class="form-label">Bank Account</label>
                    <select class="form-select" id="bank_account_id" name="bank_account_id">
                        <option value="">None / N/A</option>
                        {% for b in bank_accounts %}
                        <option value="{{ b.id }}" {% if tx.bank_account_id == b.id %}selected{% endif %}>{{ b.account_name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mb-4">
                <label for="remark" class="form-label">Remark / Notes</label>
                <textarea class="form-control" id="remark" name="remark" rows="2">{{ tx.remark or '' }}</textarea>
            </div>

            <button type="submit" class="btn btn-primary">Update Transaction</button>
            <a href="{{ url_for('routes.view_transactions') }}" class="btn btn-secondary text-white">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
